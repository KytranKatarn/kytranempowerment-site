<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f1029"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Main title -->
  <text x="600" y="260" text-anchor="middle" font-family="'Orbitron', 'Arial Black', sans-serif" font-weight="900" font-size="64" fill="#ffffff" letter-spacing="8">KYTRAN</text>
  <text x="600" y="330" text-anchor="middle" font-family="'Orbitron', 'Arial Black', sans-serif" font-weight="700" font-size="40" fill="#ffffff" letter-spacing="12">EMPOWERMENT</text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="400" font-size="24" fill="#00e5ff">AI-Powered Business Automation</text>
  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0d0d25"/>
  <rect x="0" y="558" width="1200" height="2" fill="#00e5ff" opacity="0.4"/>
  <text x="600" y="602" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="300" font-size="18" fill="#8b9dc3">16 Departments  &#x2022;  122 AI Agents  &#x2022;  8 Languages</text>
  <!-- Corner accents -->
  <rect x="40" y="40" width="60" height="3" fill="#00e5ff" opacity="0.6"/>
  <rect x="40" y="40" width="3" height="40" fill="#00e5ff" opacity="0.6"/>
  <rect x="1100" y="40" width="60" height="3" fill="#8b5cf6" opacity="0.6"/>
  <rect x="1157" y="40" width="3" height="40" fill="#8b5cf6" opacity="0.6"/>
